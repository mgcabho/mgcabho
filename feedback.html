}

}

form{

input, select, textarea{

}

}

button{

<body>

<header>

<h1>Mgcabho Construction</h1>

<nav>
<a href="index.html">Home</a>
<a href="services.html">Services</a>

<section>

<h2>Client Feedback</h2>

<p>We value your feedback. Please tell us about your experience working with Mgcabho Construction.</p>

<form onsubmit="sendFeedback(); return false;">

<input type="text" id="name" placeholder="Your Name" required>

<input type="text" id="project" placeholder="Project Name / Location">

<select id="rating">
<option>Excellent</option>
<option>Very Good</option>
<option>Good</option>
<option>Average</option>
<option>Poor</option>
</select>

<textarea id="message" placeholder="Your feedback"></textarea>

<button type="submit">Send Feedback via WhatsApp</button>

</form>

</section>


<footer>
<p>© 2026 Mgcabho Construction</p>
</footer>


<script>

function sendFeedback(){

let name = document.getElementById("name").value;
let project = document.getElementById("project").value;
let rating = document.getElementById("rating").value;
let message = document.getElementById("message").value;

let text =
"Client Feedback - Mgcabho Construction%0A%0A"+
"Name: " + name + "%0A"+
"Project: " + project + "%0A"+
"Rating: " + rating + "%0A"+
"Feedback: " + message;

let url = "https://wa.me/26878626710?text=" + text;

window.open(url, "_blank");

}

</script>


</body>
